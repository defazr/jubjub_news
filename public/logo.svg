<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="50%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="signalGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#2196f3"/>
    </linearGradient>
  </defs>

  <!-- LIVE badge -->
  <g transform="translate(70,100)">
    <!-- Rings -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#c6282830" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#c6282850" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#c6282870" stroke-width="1.5"/>
    <!-- Red circle -->
    <circle cx="0" cy="0" r="28" fill="#c62828"/>
    <!-- LIVE text -->
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="white" letter-spacing="1">LIVE</text>
  </g>

  <!-- 줍줍뉴스 text -->
  <text x="280" y="130" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif" font-weight="900" font-size="90" fill="url(#textGrad)" letter-spacing="-2">줍줍뉴스</text>

  <!-- WiFi/Signal icon -->
  <g transform="translate(700,55)">
    <!-- Signal arcs -->
    <path d="M0 45 Q30 -15 60 45" fill="none" stroke="url(#signalGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M10 40 Q30 5 50 40" fill="none" stroke="url(#signalGrad)" stroke-width="7" stroke-linecap="round"/>
    <path d="M18 36 Q30 15 42 36" fill="none" stroke="url(#signalGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Dot -->
    <circle cx="30" cy="42" r="6" fill="#c62828"/>
  </g>
</svg>
